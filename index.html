<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#8B1A4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFRLkOM5QwYREfgdgNZyA2NmFyOC9h6lw",
    authDomain: "cafe-e-tal.firebaseapp.com",
    projectId: "cafe-e-tal",
    storageBucket: "cafe-e-tal.firebasestorage.app",
    messagingSenderId: "912294098966",
    appId: "1:912294098966:web:f3ba646b58467128b49d37"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db;
  window._col = collection;
  window._doc = doc;
  window._getDocs = getDocs;
  window._setDoc = setDoc;
  window._deleteDoc = deleteDoc;
  window._onSnapshot = onSnapshot;
  window._writeBatch = writeBatch;
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>
<script>
  // Fallback: se o módulo Firebase não carregar em 6s, mostrar erro
  setTimeout(function() {
    if (!window._firebaseReady) {
      var root = document.getElementById('root');
      if (root && root.innerHTML === '') {
        root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui;padding:2rem;text-align:center;">' +
          '<div style="font-size:40px;margin-bottom:1rem">☕</div>' +
          '<div style="font-size:18px;font-weight:700;color:#8B1A4A;margin-bottom:0.5rem">Café & Tal</div>' +
          '<div style="font-size:14px;color:#7A5C4A;margin-bottom:1.5rem">Verifique sua conexão com a internet e recarregue.</div>' +
          '<button onclick="location.reload()" style="background:#8B1A4A;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">Tentar novamente</button>' +
          '</div>';
      }
    }
  }, 6000);
</script>
<style>
  :root {
    --wine: #8B1A4A; --wine-dark: #6B1238; --wine-light: #B02560;
    --gold: #D4AF6A; --gold-light: #E8C97C; --gold-dark: #A88245;
    --cream: #FDF8F0; --cream-dark: #F5EDD8;
    --text: #2C1810; --text-muted: #7A5C4A;
    --border: #E8D5B0;
    --success: #2D6A4F; --success-bg: #D8F3DC;
    --danger: #9B2226; --danger-bg: #FFE5E5;
    --warning: #8B6914; --warning-bg: #FFF3CD;
    --radius: 10px; --shadow: 0 2px 12px rgba(139,26,74,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  input, select, textarea, button { font-family: inherit; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--wine); color: var(--gold); padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: var(--gold); white-space: nowrap; }
  .topbar-logo span { color: var(--gold-light); font-weight: 400; }
  
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-left: 4px; display: inline-block; }
  .sync-dot.syncing { background: #fbbf24; animation: pulse 1s infinite; }
  .sync-dot.error { background: #f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .main { flex: 1; padding: 1.5rem; max-width: 960px; margin: 0 auto; width: 100%; }
  .page-title { font-size: 20px; font-weight: 700; color: var(--wine); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }

  .form-row { display: grid; gap: 10px; margin-bottom: 10px; }
  .form-row.cols2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.cols4 { grid-template-columns: 1fr 1fr 1fr auto; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 14px; color: var(--text); background: var(--cream); transition: border-color 0.15s; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--wine); background: #fff; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; cursor: pointer; }
  .btn-primary { background: var(--wine); color: #fff; }
  .btn-primary:hover { background: var(--wine-dark); }
  .btn-gold { background: var(--gold); color: var(--wine); }
  .btn-gold:hover { background: var(--gold-dark); color: #fff; }
  .btn-ghost { background: none; border: 1.5px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--wine); color: var(--wine); }
  .btn-danger { background: none; border: 1.5px solid var(--danger-bg); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  .badge-red { background: var(--danger-bg); color: var(--danger); }

  .badge-wine { background: #F5E6ED; color: var(--wine); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1.5px solid var(--border); }
  td { padding: 9px 10px; border-bottom: 1px solid var(--cream-dark); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }
  .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
  .metric-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 700; color: var(--wine); }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1rem; background: var(--cream-dark); padding: 4px; border-radius: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 7px 12px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; background: none; color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { background: #fff; color: var(--wine); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .modal-bg { position: fixed; inset: 0; background: rgba(44,24,16,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--wine); margin-bottom: 1rem; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--cream-dark); }
  .nota-preview { background: var(--cream); border: 1px dashed var(--gold); border-radius: var(--radius); padding: 1rem; font-family: monospace; font-size: 13px; white-space: pre-wrap; color: var(--text); margin-bottom: 1rem; max-height: 300px; overflow-y: auto; }
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top:0;left:0;right:0;bottom:0; background:#ccc; border-radius:20px; transition:.2s; }
  .toggle-slider:before { position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s; }
  .toggle input:checked + .toggle-slider { background: var(--wine); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; }
  .alert-success { background: var(--success-bg); color: var(--success); }
  .alert-danger { background: var(--danger-bg); color: var(--danger); }
  .item-linha { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
  .separator { height: 1px; background: var(--cream-dark); margin: 1rem 0; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .total-row.grand { font-size: 16px; font-weight: 700; color: var(--wine); border-top: 2px solid var(--wine); padding-top: 10px; margin-top: 4px; }
  .whats-btn { background:#25D366;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;width:100%;justify-content:center; }
  .bar-wrap { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
  .bar-label { font-size:12px;color:var(--text);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .bar-bg { flex:1;background:var(--cream-dark);border-radius:4px;height:12px; }
  .bar-fill { height:12px;border-radius:4px;background:var(--wine);transition:width 0.4s; }
  .bar-val { font-size:12px;color:var(--text-muted);min-width:80px;text-align:right; }
  .loading-screen { display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem; }
  .spinner { width:40px;height:40px;border:3px solid var(--cream-dark);border-top-color:var(--wine);border-radius:50%;animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scroll-x { overflow-x: auto; }
  .highlight-row td { font-weight: 700; }
  /* Layout com sidebar */
  .layout { display: flex; flex: 1; min-height: 0; }
  .sidebar { width: 200px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--border); padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
  .sidebar-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; background: none; width: 100%; text-align: left; }
  .sidebar-card:hover { background: var(--cream); border-color: var(--border); }
  .sidebar-card.active { background: #F5E6ED; border-color: #E8C5D5; }
  .sidebar-icon { font-size: 20px; flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: var(--cream-dark); }
  .sidebar-card.active .sidebar-icon { background: var(--wine); }
  .sidebar-label { font-size: 13px; font-weight: 600; color: var(--text-muted); line-height: 1.2; }
  .sidebar-card.active .sidebar-label { color: var(--wine); }
  .sidebar-sub { font-size: 11px; color: var(--text-muted); opacity: 0.7; }
  .content-area { flex: 1; padding: 1.5rem; overflow-y: auto; min-width: 0; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .bottom-nav { display: flex !important; }
    .content-area { padding: 1rem; padding-bottom: 80px; }
  }
  .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); z-index: 100; padding: 6px 0 env(safe-area-inset-bottom); }
  .bottom-nav-inner { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0 4px; }
  .bottom-nav-inner::-webkit-scrollbar { display: none; }
  .bnav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 8px; border: none; background: none; cursor: pointer; border-radius: 8px; min-width: 44px; }
  .bnav-btn .bnav-icon { font-size: 20px; }
  .bnav-btn .bnav-label { font-size: 9px; font-weight: 600; color: var(--text-muted); }
  .bnav-btn.active .bnav-label { color: var(--wine); }
  .bnav-btn.active .bnav-icon { filter: none; }

  @media print {
    .no-print { display: none !important; }
    body { background: white; }
    .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
    .topbar { display: none; }
    .sidebar { display: none; }
    .bottom-nav { display: none; }
    .content-area { padding: 0; }
  }
  @media (max-width: 640px) {
    .nav-btn { padding: 8px 7px; font-size: 11px; }
    .form-row.cols2, .form-row.cols3, .form-row.cols4 { grid-template-columns: 1fr; }
    .main { padding: 1rem; }
    .item-linha { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ── Firebase helpers ──────────────────────────────────────────────
function getDB() { return window._db; }
function colRef(name) { return window._col(getDB(), name); }
function docRef(col, id) { return window._doc(getDB(), col, id); }

async function saveDoc(colName, id, data) {
  await window._setDoc(docRef(colName, id), data);
}
async function deleteDocById(colName, id) {
  await window._deleteDoc(docRef(colName, id));
}
function subscribeCol(colName, callback) {
  return window._onSnapshot(colRef(colName), snap => {
    const docs = {};
    snap.forEach(d => { docs[d.id] = { id: d.id, ...d.data() }; });
    callback(docs);
  });
}

// ── Utils ─────────────────────────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function pct(a,b) { return b>0?((a/b)*100).toFixed(1)+'%':'—'; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function hoje() { return new Date().toISOString().slice(0,10); }
function primeiroDiaMes() { const d=new Date();d.setDate(1);return d.toISOString().slice(0,10); }

// ── useFirestore hook ─────────────────────────────────────────────
function useFirestore(colName) {
  const [docs, setDocs] = useState({});
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!window._firebaseReady) return;
    const unsub = subscribeCol(colName, d => { setDocs(d); setLoading(false); });
    return unsub;
  }, [colName]);
  const arr = useMemo(() => Object.values(docs), [docs]);
  return { docs, arr, loading };
}

// ── PRODUTOS ──────────────────────────────────────────────────────
function Produtos({ syncing, setSyncing }) {
  const { arr: produtos, loading } = useFirestore('produtos');
  const { docs: estoqueDelivery } = useFirestore('estoque_delivery');
  const { docs: estoqueFeirinha } = useFirestore('estoque_feirinha');
  const [form, setForm] = useState({ nome:'', custo:'', venda:'' });
  const [estoqueEdit, setEstoqueEdit] = useState(null);
  const [nomeEdit, setNomeEdit] = useState(null);
  const [alert, setAlert] = useState(null);

  function showAlert(tipo, msg) { setAlert({tipo,msg}); setTimeout(()=>setAlert(null),2500); }

  async function salvarNome() {
    if(!nomeEdit.nome.trim()) return;
    setSyncing(true);
    const p = produtos.find(x=>x.id===nomeEdit.id);
    await saveDoc('produtos', nomeEdit.id, {...p, nome:nomeEdit.nome.trim()});
    setNomeEdit(null);
    setSyncing(false);
  }

  async function salvar() {
    if (!form.nome||!form.venda) return showAlert('danger','Preencha nome e preço de venda.');
    const id = uid();
    setSyncing(true);
    try {
      await saveDoc('produtos', id, { nome:form.nome, custo:parseFloat(form.custo)||0, venda:parseFloat(form.venda), ativo:true });
      await saveDoc('estoque_delivery', id, { qtd:0 });
      await saveDoc('estoque_feirinha', id, { qtd:0 });
      setForm({nome:'',custo:'',venda:''});
      showAlert('success','Produto cadastrado!');
    } catch(e){ showAlert('danger','Erro ao salvar.'); }
    setSyncing(false);
  }

  async function toggleAtivo(p) {
    setSyncing(true);
    await saveDoc('produtos', p.id, {...p, ativo:!p.ativo});
    setSyncing(false);
  }

  async function atualizarEstoque() {
    setSyncing(true);
    await saveDoc('estoque_delivery', estoqueEdit.id, { qtd: parseInt(estoqueEdit.delivery)||0 });
    await saveDoc('estoque_feirinha', estoqueEdit.id, { qtd: parseInt(estoqueEdit.feirinha)||0 });
    setEstoqueEdit(null);
    setSyncing(false);
  }

  async function excluir(id) {
    if (!confirm('Excluir produto?')) return;
    setSyncing(true);
    await deleteDocById('produtos', id);
    setSyncing(false);
  }

  if (loading) return <div className="loading-screen"><div className="spinner"/><span style={{color:'var(--text-muted)'}}>Carregando produtos...</span></div>;

  return (
    <div>
      <div className="page-title">☕ Produtos</div>
      {alert && <div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}
      <div className="card">
        <div className="card-title">Novo produto</div>
        <div className="form-row cols3">
          <div className="field"><label>Nome</label><input value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Café Especial 250g"/></div>
          <div className="field"><label>Custo (R$)</label><input type="number" value={form.custo} onChange={e=>setForm(f=>({...f,custo:e.target.value}))} placeholder="0,00"/></div>
          <div className="field"><label>Venda (R$)</label><input type="number" value={form.venda} onChange={e=>setForm(f=>({...f,venda:e.target.value}))} placeholder="0,00"/></div>
        </div>
        <button className="btn btn-primary" onClick={salvar} disabled={syncing}>Cadastrar produto</button>
      </div>

      {nomeEdit && (
        <div className="card" style={{borderColor:'var(--gold)'}}>
          <div className="card-title">Editar nome do produto</div>
          <div className="form-row">
            <div className="field"><label>Nome</label><input value={nomeEdit.nome} onChange={e=>setNomeEdit(n=>({...n,nome:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&salvarNome()}/></div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-gold" onClick={salvarNome} disabled={syncing}>Salvar nome</button>
            <button className="btn btn-ghost" onClick={()=>setNomeEdit(null)}>Cancelar</button>
          </div>
        </div>
      )}

      {estoqueEdit && (
        <div className="card" style={{borderColor:'var(--gold)'}}>
          <div className="card-title">Ajustar estoque — {produtos.find(p=>p.id===estoqueEdit.id)?.nome}</div>
          <div className="form-row cols2">
            <div className="field"><label>Estoque Delivery</label><input type="number" value={estoqueEdit.delivery} onChange={e=>setEstoqueEdit(s=>({...s,delivery:e.target.value}))}/></div>
            <div className="field"><label>Estoque Feirinha</label><input type="number" value={estoqueEdit.feirinha} onChange={e=>setEstoqueEdit(s=>({...s,feirinha:e.target.value}))}/></div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-gold" onClick={atualizarEstoque} disabled={syncing}>Salvar estoque</button>
            <button className="btn btn-ghost" onClick={()=>setEstoqueEdit(null)}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="card">
        <div className="scroll-x">
          <table>
            <thead><tr><th>Produto</th><th>Custo</th><th>Venda</th><th>Margem</th><th>Stk Delivery</th><th>Stk Feira</th><th>Ativo</th><th></th></tr></thead>
            <tbody>
              {produtos.length===0 && <tr><td colSpan={8}><div className="empty-state">Nenhum produto cadastrado</div></td></tr>}
              {produtos.map(p => {
                const margem = p.custo>0?((p.venda-p.custo)/p.venda*100).toFixed(0)+'%':'—';
                return (
                  <tr key={p.id} style={{opacity:p.ativo?1:0.5}}>
                    <td style={{fontWeight:600}}>{p.nome}</td>
                    <td>{fmt(p.custo)}</td>
                    <td style={{color:'var(--wine)',fontWeight:700}}>{fmt(p.venda)}</td>
                    <td><span className="badge badge-green">{margem}</span></td>
                    <td>{estoqueDelivery[p.id]?.qtd??0}</td>
                    <td>{estoqueFeirinha[p.id]?.qtd??0}</td>
                    <td><label className="toggle"><input type="checkbox" checked={!!p.ativo} onChange={()=>toggleAtivo(p)}/><span className="toggle-slider"/></label></td>
                    <td style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setNomeEdit({id:p.id,nome:p.nome})}>✏</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEstoqueEdit({id:p.id,delivery:estoqueDelivery[p.id]?.qtd??0,feirinha:estoqueFeirinha[p.id]?.qtd??0})}>Estoque</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>excluir(p.id)}>✕</button>
                    </td>

      </div>

  );
}

// ── VENDEDORES ────────────────────────────────────────────────────
function Vendedores({ syncing, setSyncing }) {
  const { arr: vendedores, loading } = useFirestore('vendedores');
  const { arr: vendas } = useFirestore('vendas');
  const { arr: compradores } = useFirestore('compradores');
  const { arr: produtos } = useFirestore('produtos');
  const [form, setForm] = useState({nome:'',telefone:''});
  const [resumoModal, setResumoModal] = useState(null);
  const [filtroPeriodo, setFiltroPeriodo] = useState({de:primeiroDiaMes(),ate:hoje()});
  const [alert, setAlert] = useState(null);

  function showAlert(tipo,msg){setAlert({tipo,msg});setTimeout(()=>setAlert(null),2500);}

  function gerarResumoVendedor(v) {
    const vendasVend = vendas.filter(vd =>
      vd.vendedor_id === v.id &&
      (!filtroPeriodo.de || vd.data >= filtroPeriodo.de) &&
      (!filtroPeriodo.ate || vd.data <= filtroPeriodo.ate)
    ).sort((a,b) => a.data.localeCompare(b.data));

    if (vendasVend.length === 0) {
      return showAlert('danger', `${v.nome} não tem vendas nesse período.`);
    }

    const total = vendasVend.reduce((a,vd) => a + vd.total, 0);
    const pendente = vendasVend.filter(vd => vd.status === 'pendente').reduce((a,vd) => a + vd.total, 0);
    const pago = vendasVend.filter(vd => vd.status === 'pago').reduce((a,vd) => a + vd.total, 0);

    let t = `☕ *CAFÉ & TAL — Suas vendas*\n`;
    t += `👤 *${v.nome}*\n`;
    if (filtroPeriodo.de || filtroPeriodo.ate) {
      const de = filtroPeriodo.de ? filtroPeriodo.de.split('-').reverse().join('/') : 'início';
      const ate = filtroPeriodo.ate ? filtroPeriodo.ate.split('-').reverse().join('/') : 'hoje';
      t += `📅 ${de} a ${ate}\n`;
    }
    t += `━━━━━━━━━━━━━━━━━━━━\n`;
    vendasVend.forEach(vd => {
      const comp = compradores.find(c => c.id === vd.comprador_id);
      t += `\n📦 *${comp?.nome || '—'}*`;
      if (comp?.cidade) t += ` (${comp.cidade})`;
      t += `\n📅 ${vd.data.split('-').reverse().join('/')}\n`;
      t += `  💰 ${fmt(vd.total)}`;
      if (vd.desconto > 0) t += ` (desc. ${fmt(vd.desconto)})`;
      t += vd.status === 'pago' ? ' ✅' : ' ⏳';
      t += `\n`;
    });
    t += `━━━━━━━━━━━━━━━━━━━━\n`;
    t += `📊 *Total: ${fmt(total)}*\n`;
    if (pago > 0) t += `✅ Recebido: ${fmt(pago)}\n`;
    if (pendente > 0) t += `⏳ Pendente: ${fmt(pendente)}\n`;

    setResumoModal({ texto: t, vendedor: v });
  }

  async function salvar() {
    if(!form.nome) return showAlert('danger','Informe o nome.');
    setSyncing(true);
    await saveDoc('vendedores', uid(), {nome:form.nome, telefone:form.telefone});
    setForm({nome:'',telefone:''});
    showAlert('success','Vendedor cadastrado!');
    setSyncing(false);
  }

  async function excluir(id) {
    if(!confirm('Excluir vendedor?')) return;
    setSyncing(true);
    await deleteDocById('vendedores',id);
    setSyncing(false);
  }

  if(loading) return <div className="loading-screen"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-title">👤 Vendedores</div>
      {alert && <div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}
      <div className="card">
        <div className="card-title">Novo vendedor</div>
        <div className="form-row cols2">
          <div className="field"><label>Nome</label><input value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Nome completo"/></div>
          <div className="field"><label>Telefone (opcional)</label><input value={form.telefone} onChange={e=>setForm(f=>({...f,telefone:e.target.value}))} placeholder="(99) 99999-9999"/></div>
        </div>
        <button className="btn btn-primary" onClick={salvar} disabled={syncing}>Cadastrar vendedor</button>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="card-title">Resumo por período</div>
        <div className="form-row cols2" style={{marginBottom:8}}>
          <div className="field"><label>De</label><input type="date" value={filtroPeriodo.de} onChange={e=>setFiltroPeriodo(f=>({...f,de:e.target.value}))}/></div>
          <div className="field"><label>Até</label><input type="date" value={filtroPeriodo.ate} onChange={e=>setFiltroPeriodo(f=>({...f,ate:e.target.value}))}/></div>
        </div>
        <div style={{fontSize:12,color:'var(--text-muted)'}}>Clique em 📲 na linha do vendedor para enviar o resumo via WhatsApp.</div>
      </div>

      <div className="card">
        <table>
          <thead><tr><th>Nome</th><th>Telefone</th><th>Vendas</th><th></th></tr></thead>
          <tbody>
            {vendedores.length===0 && <tr><td colSpan={4}><div className="empty-state">Nenhum vendedor cadastrado</div></td></tr>}
            {vendedores.map(v => {
              const qtd = vendas.filter(vd=>vd.vendedor_id===v.id).length;
              return (
                <tr key={v.id}>
                  <td style={{fontWeight:600}}>{v.nome}</td>
                  <td style={{color:'var(--text-muted)'}}>{v.telefone||'—'}</td>
                  <td><span className="badge badge-wine">{qtd} venda{qtd!==1?'s':''}</span></td>
                  <td style={{display:'flex',gap:4}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>gerarResumoVendedor(v)} title="Enviar resumo por WhatsApp">📲</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>excluir(v.id)}>✕</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {resumoModal && (
        <div className="modal-bg" onClick={()=>setResumoModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">📲 Resumo — {resumoModal.vendedor.nome}</div>
            <div className="nota-preview">{resumoModal.texto}</div>
            <button className="whats-btn" onClick={()=>{
              const tel = resumoModal.vendedor.telefone?.replace(/\D/g,'');
              const msg = encodeURIComponent(resumoModal.texto);
              window.open(tel ? `https://wa.me/55${tel}?text=${msg}` : `https://wa.me/?text=${msg}`, '_blank');
            }}>📲 Abrir no WhatsApp</button>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>navigator.clipboard?.writeText(resumoModal.texto)}>Copiar texto</button>
              <button className="btn btn-ghost" onClick={()=>setResumoModal(null)}>Fechar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── VENDAS ────────────────────────────────────────────────────────
function Vendas({ syncing, setSyncing }) {
  const { arr: produtos } = useFirestore('produtos');
  const { arr: vendedores } = useFirestore('vendedores');
  const { arr: compradores } = useFirestore('compradores');
  const { arr: vendas, loading } = useFirestore('vendas');
  const { docs: estoqueDelivery } = useFirestore('estoque_delivery');
  const [tab, setTab] = useState('nova');
  const [form, setForm] = useState({comprador_id:'',vendedor_id:'',data:hoje(),itens:[{produto_id:'',qtd:1}],obs:'',status:'pendente',desconto_tipo:'pct',desconto_valor:''});
  const [alert, setAlert] = useState(null);
  const [notaModal, setNotaModal] = useState(null);
  const [editandoVenda, setEditandoVenda] = useState(null);
  const [filtro, setFiltro] = useState('todos');

  function showAlert(tipo,msg){setAlert({tipo,msg});setTimeout(()=>setAlert(null),2500);}
  function addItem(){setForm(f=>({...f,itens:[...f.itens,{produto_id:'',qtd:1}]}));}
  function removeItem(i){setForm(f=>({...f,itens:f.itens.filter((_,idx)=>idx!==i)}));}
  function setItem(i,key,val){setForm(f=>({...f,itens:f.itens.map((it,idx)=>idx===i?{...it,[key]:val}:it)}));}

  function calcSubtotal(itens){
    return itens.reduce((acc,it)=>{
      const p=produtos.find(x=>x.id===it.produto_id);
      return acc+(p?p.venda*(parseInt(it.qtd)||0):0);
    },0);
  }
  function calcDesconto(itens, tipo, valor){
    const sub=calcSubtotal(itens);
    if(!valor||parseFloat(valor)<=0) return 0;
    if(tipo==='pct') return sub*(parseFloat(valor)/100);
    return Math.min(parseFloat(valor),sub);
  }
  function calcTotal(itens, tipo, valor){
    return Math.max(0, calcSubtotal(itens)-calcDesconto(itens,tipo||'pct',valor||''));
  }
  function calcLucro(itens, tipo, valor){
    const lucroBase=itens.reduce((acc,it)=>{
      const p=produtos.find(x=>x.id===it.produto_id);
      return acc+(p?(p.venda-p.custo)*(parseInt(it.qtd)||0):0);
    },0);
    const desc=calcDesconto(itens,tipo||'pct',valor||'');
    return Math.max(0,lucroBase-desc);
  }

  async function salvar() {
    if(!form.comprador_id||!form.vendedor_id) return showAlert('danger','Selecione comprador e vendedor.');
    if(form.itens.some(it=>!it.produto_id||!it.qtd)) return showAlert('danger','Preencha todos os itens.');
    setSyncing(true);
    try {
      const id = uid();
      const descValor=calcDesconto(form.itens,form.desconto_tipo,form.desconto_valor);
      const venda = {...form, id, subtotal:calcSubtotal(form.itens), desconto:descValor, total:calcTotal(form.itens,form.desconto_tipo,form.desconto_valor), lucro:calcLucro(form.itens,form.desconto_tipo,form.desconto_valor), criado_em:new Date().toISOString()};
      await saveDoc('vendas', id, venda);
      // baixa estoque delivery
      for(const it of form.itens){
        const atual = estoqueDelivery[it.produto_id]?.qtd||0;
        await saveDoc('estoque_delivery', it.produto_id, {qtd:Math.max(0,atual-(parseInt(it.qtd)||0))});
      }
      setForm({comprador_id:'',vendedor_id:'',data:hoje(),itens:[{produto_id:'',qtd:1}],obs:'',status:'pendente'});
      showAlert('success','Venda registrada!');
      setTab('lista');
    } catch(e){ showAlert('danger','Erro ao salvar.'); }
    setSyncing(false);
  }

  async function togglePago(venda) {
    setSyncing(true);
    await saveDoc('vendas', venda.id, {...venda, status:venda.status==='pago'?'pendente':'pago'});
    setSyncing(false);
  }

  async function excluirVenda(id) {
    if(!confirm('Excluir venda?')) return;
    setSyncing(true);
    await deleteDocById('vendas',id);
    setSyncing(false);
  }

  function abrirEdicao(venda) {
    setEditandoVenda({
      id: venda.id,
      comprador_id: venda.comprador_id,
      vendedor_id: venda.vendedor_id,
      data: venda.data,
      itens: venda.itens ? [...venda.itens.map(it=>({...it}))] : [{produto_id:'',qtd:1}],
      obs: venda.obs||'',
      status: venda.status,
      desconto_tipo: venda.desconto_tipo||'pct',
      desconto_valor: venda.desconto_valor||'',
    });
    setTab('editar');
  }

  async function salvarEdicaoVenda() {
    if(!editandoVenda.comprador_id||!editandoVenda.vendedor_id) return showAlert('danger','Selecione comprador e vendedor.');
    if(editandoVenda.itens.some(it=>!it.produto_id||!it.qtd)) return showAlert('danger','Preencha todos os itens.');
    setSyncing(true);
    try {
      const descValor = calcDesconto(editandoVenda.itens, editandoVenda.desconto_tipo, editandoVenda.desconto_valor);
      const total = calcTotal(editandoVenda.itens, editandoVenda.desconto_tipo, editandoVenda.desconto_valor);
      const lucro = calcLucro(editandoVenda.itens, editandoVenda.desconto_tipo, editandoVenda.desconto_valor);
      const vendaAtualizada = {
        ...editandoVenda,
        subtotal: calcSubtotal(editandoVenda.itens),
        desconto: descValor,
        total,
        lucro,
      };
      await saveDoc('vendas', editandoVenda.id, vendaAtualizada);
      showAlert('success','Venda atualizada!');
      setEditandoVenda(null);
      setTab('lista');
    } catch(e){ showAlert('danger','Erro ao salvar.'); }
    setSyncing(false);
  }

  function gerarNota(venda) {
    const comp = compradores.find(c=>c.id===venda.comprador_id);
    const vend = vendedores.find(v=>v.id===venda.vendedor_id);
    let t=`☕ *CAFÉ & TAL*\n━━━━━━━━━━━━━━━━━━━━\n`;
    t+=`📋 *Pedido #${venda.id.slice(0,6).toUpperCase()}*\n`;
    t+=`📅 ${venda.data}\n`;
    t+=`👤 Cliente: ${comp?.nome||'—'}\n`;
    if(comp?.cidade) t+=`📍 ${comp.cidade}\n`;
    if(comp?.endereco) t+=`🏠 ${comp.endereco}\n`;
    t+=`🤝 Vendedor: ${vend?.nome||'—'}\n`;
    t+=`━━━━━━━━━━━━━━━━━━━━\n*ITENS:*\n`;
    venda.itens?.forEach(it=>{
      const p=produtos.find(x=>x.id===it.produto_id);
      if(p) t+=`• ${p.nome} x${it.qtd} = ${fmt(p.venda*it.qtd)}\n`;
    });
    t+=`━━━━━━━━━━━━━━━━━━━━\n`;
    if(venda.desconto>0) {
      t+=`🏷 Subtotal: ${fmt(venda.subtotal)}\n`;
      t+=`🎁 Desconto: − ${fmt(venda.desconto)}\n`;
    }
    t+=`💰 *TOTAL: ${fmt(venda.total)}*\n`;
    if(venda.obs) t+=`📝 ${venda.obs}\n`;
    if(venda.status==='pago') t+=`\n✅ *PAGAMENTO CONFIRMADO*\n`;
    t+=`\nObrigada pela preferência! 🙏☕`;
    setNotaModal({texto:t,venda,comp});
  }

  const prodAtivos = produtos.filter(p=>p.ativo);
  const vendasFiltradas = filtro==='todos'?vendas:vendas.filter(v=>v.status===filtro);
  const pendentesQtd = vendas.filter(v=>v.status==='pendente').length;

  if(loading) return <div className="loading-screen"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-title">🛒 Vendas</div>
      <div className="tab-bar">
        <button className={`tab-btn ${tab==='nova'?'active':''}`} onClick={()=>setTab('nova')}>Nova venda</button>
        <button className={`tab-btn ${tab==='lista'?'active':''}`} onClick={()=>setTab('lista')}>Histórico</button>
        <button className={`tab-btn ${tab==='pendentes'?'active':''}`} onClick={()=>setTab('pendentes')}>
          Pendências {pendentesQtd>0&&<span className="badge badge-gold" style={{marginLeft:4}}>{pendentesQtd}</span>}
        </button>
        {editandoVenda&&<button className={`tab-btn ${tab==='editar'?'active':''}`} onClick={()=>setTab('editar')} style={{color:'var(--warning)'}}>✏ Editando</button>}
      </div>

      {tab==='nova'&&(
        <div className="card">
          {alert&&<div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}
          <div className="card-title">Registrar venda</div>

// ── FEIRINHA ──────────────────────────────────────────────────────
function Feirinha({ syncing, setSyncing }) {
  const { arr: produtos } = useFirestore('produtos');
  const { arr: feirinha, loading } = useFirestore('feirinha');
  const { docs: estoqueFeirinha } = useFirestore('estoque_feirinha');
  const { arr: participacoes } = useFirestore('participacoes');
  const [tab, setTab] = useState('nova');
  const [form, setForm] = useState({itens:[{produto_id:'',qtd:1,preco_unitario:''}]});
  const [alert, setAlert] = useState(null);

  // Sessão ativa — persiste no localStorage
  const [sessaoId, setSessaoId] = useState(() => localStorage.getItem('feirinha_sessao') || '');

  const sessaoAtiva = useMemo(() =>
    sessaoId ? participacoes.find(p => p.id === sessaoId) : null,
    [sessaoId, participacoes]
  );

  function showAlert(tipo,msg){setAlert({tipo,msg});setTimeout(()=>setAlert(null),2500);}

  function abrirSessao(partId) {
    localStorage.setItem('feirinha_sessao', partId);
    setSessaoId(partId);
    showAlert('success', 'Sessão aberta! Todas as vendas serão vinculadas a esta participação.');
  }

  function encerrarSessao() {
    if(!confirm('Encerrar sessão da feira?')) return;
    localStorage.removeItem('feirinha_sessao');
    setSessaoId('');
    showAlert('success', 'Sessão encerrada.');
  }

  function setItem(i,key,val){setForm(f=>({...f,itens:f.itens.map((it,idx)=>idx===i?{...it,[key]:val}:it)}));}
  function addItem(){setForm(f=>({...f,itens:[...f.itens,{produto_id:'',qtd:1,preco_unitario:''}]}));}
  function removeItem(i){setForm(f=>({...f,itens:f.itens.filter((_,idx)=>idx!==i)}));}

  function autoPreco(i,pid){
    const p=produtos.find(x=>x.id===pid);
    setForm(f=>({...f,itens:f.itens.map((it,idx)=>idx===i?{...it,produto_id:pid,preco_unitario:p?p.venda:''}:it)}));
  }

  function calcTotal(itens){return itens.reduce((a,it)=>a+((parseFloat(it.preco_unitario)||0)*(parseInt(it.qtd)||0)),0);}
  function calcLucro(itens){
    return itens.reduce((a,it)=>{
      const p=produtos.find(x=>x.id===it.produto_id);
      return a+((parseFloat(it.preco_unitario)-(p?.custo||0))*(parseInt(it.qtd)||0));
    },0);
  }

  async function salvar() {
    if(!sessaoAtiva) return showAlert('danger','Abra uma sessão de feira antes de registrar vendas.');
    if(form.itens.some(it=>!it.produto_id||!it.qtd||!it.preco_unitario)) return showAlert('danger','Preencha todos os itens.');
    setSyncing(true);
    try {
      const id=uid();
      await saveDoc('feirinha',id,{
        participacao_id: sessaoAtiva.id,
        feira_nome: sessaoAtiva.feira_nome,
        data: hoje(),
        local: sessaoAtiva.feira_nome,
        itens: form.itens,
        total: calcTotal(form.itens),
        lucro: calcLucro(form.itens),
        criado_em: new Date().toISOString(),
      });
      for(const it of form.itens){
        const atual=estoqueFeirinha[it.produto_id]?.qtd||0;
        await saveDoc('estoque_feirinha',it.produto_id,{qtd:Math.max(0,atual-(parseInt(it.qtd)||0))});
      }
      setForm({itens:[{produto_id:'',qtd:1,preco_unitario:''}]});
      showAlert('success','Venda registrada!');
    } catch(e){showAlert('danger','Erro ao salvar.');}
    setSyncing(false);
  }

  async function excluir(id){
    if(!confirm('Excluir registro?')) return;
    setSyncing(true);
    await deleteDocById('feirinha',id);
    setSyncing(false);
  }

  const prodAtivos=produtos.filter(p=>p.ativo);

  // Métricas gerais
  const inscricoesContadas=new Set();
  const totalInscricoes=feirinha.reduce((a,f)=>{
    if(f.participacao_id&&!inscricoesContadas.has(f.participacao_id)){
      inscricoesContadas.add(f.participacao_id);
      const part=participacoes.find(p=>p.id===f.participacao_id);
      return a+(part?.inscricao||0);
    }
    return a;
  },0);
  const totalFeiras=feirinha.reduce((a,f)=>a+f.total,0);
  const lucroFeiras=Math.max(0,feirinha.reduce((a,f)=>a+(f.lucro||0),0)-totalInscricoes);

  if(loading) return <div className="loading-screen"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-title">🏪 Feirinha</div>

      {/* Banner de sessão */}
      {sessaoAtiva ? (
        <div className="card" style={{borderLeft:'4px solid var(--success)',background:'#F0FBF4',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontWeight:700,color:'var(--success)'}}>🟢 Sessão ativa</div>
              <div style={{fontSize:14,fontWeight:600,marginTop:2}}>{sessaoAtiva.feira_nome}</div>
              <div style={{fontSize:12,color:'var(--text-muted)'}}>
                {sessaoAtiva.data_inicio?.split('-').reverse().join('/')}
                {sessaoAtiva.data_fim&&sessaoAtiva.data_fim!==sessaoAtiva.data_inicio?` a ${sessaoAtiva.data_fim.split('-').reverse().join('/')}`:''}
                {sessaoAtiva.inscricao>0&&` · inscrição ${fmt(sessaoAtiva.inscricao)}`}
              </div>
            </div>
            <button className="btn btn-danger btn-sm" onClick={encerrarSessao}>Encerrar sessão</button>
          </div>
        </div>
      ) : (
        <div className="card" style={{borderLeft:'4px solid var(--warning)',background:'#FFFBF0',marginBottom:12}}>
          <div style={{fontWeight:700,color:'var(--warning)',marginBottom:8}}>⚠ Nenhuma sessão ativa</div>
          <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:10}}>Selecione uma participação para abrir a sessão do dia. Todas as vendas serão vinculadas automaticamente.</div>
          <div className="field" style={{marginBottom:10}}>
            <label>Selecionar participação</label>
            <select onChange={e=>e.target.value&&abrirSessao(e.target.value)} defaultValue="">
              <option value="">Escolher participação...</option>
              {[...participacoes].sort((a,b)=>b.data_inicio.localeCompare(a.data_inicio)).map(p=>{
                const ini=p.data_inicio?.split('-').reverse().join('/');
                const fim=p.data_fim&&p.data_fim!==p.data_inicio?` a ${p.data_fim.split('-').reverse().join('/')}`:'' ;
                return <option key={p.id} value={p.id}>{p.feira_nome} · {ini}{fim}</option>;
              })}
            </select>
          </div>
        </div>
      )}

      <div className="metric-grid" style={{marginBottom:16}}>
        <div className="metric"><div className="metric-label">Total arrecadado</div><div className="metric-value">{fmt(totalFeiras)}</div></div>
        <div className="metric"><div className="metric-label">Lucro líquido</div><div className="metric-value" style={{color:'var(--success)'}}>{fmt(lucroFeiras)}</div></div>
        <div className="metric"><div className="metric-label">Registros</div><div className="metric-value">{feirinha.length}</div></div>
      </div>

      <div className="tab-bar">
        <button className={`tab-btn ${tab==='nova'?'active':''}`} onClick={()=>setTab('nova')}>Registrar venda</button>
        <button className={`tab-btn ${tab==='historico'?'active':''}`} onClick={()=>setTab('historico')}>Histórico</button>
      </div>

      {tab==='nova'&&(
        <div className="card">
          {alert&&<div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}
          <div className="card-title">Venda na feira</div>
          {!sessaoAtiva && <div className="alert alert-danger">Abra uma sessão primeiro para registrar vendas.</div>}
          <div style={{marginBottom:8,fontWeight:700,fontSize:13,color:'var(--text-muted)'}}>ITENS VENDIDOS</div>
          {form.itens.map((it,i)=>(
            <div key={i} className="item-linha">
              <div className="field" style={{flex:2}}>
                {i===0&&<label>Produto</label>}
                <select value={it.produto_id} onChange={e=>autoPreco(i,e.target.value)}>
                  <option value="">Selecionar...</option>
                  {prodAtivos.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
                </select>
              </div>
              <div className="field" style={{width:70}}>
                {i===0&&<label>Qtd</label>}
                <input type="number" min="1" value={it.qtd} onChange={e=>setItem(i,'qtd',e.target.value)}/>
              </div>
              <div className="field" style={{width:100}}>
                {i===0&&<label>Preço unit.</label>}
                <input type="number" step="0.01" value={it.preco_unitario} onChange={e=>setItem(i,'preco_unitario',e.target.value)} placeholder="0,00"/>
              </div>
              <div style={{paddingBottom:2}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>removeItem(i)} disabled={form.itens.length===1}>✕</button>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost btn-sm" style={{marginBottom:12}} onClick={addItem}>+ Adicionar item</button>
          <div className="total-row grand"><span>TOTAL</span><span>{fmt(calcTotal(form.itens))}</span></div>
          <div className="total-row"><span style={{fontSize:12,color:'var(--text-muted)'}}>Lucro estimado (vendas)</span><span style={{color:'var(--success)',fontSize:13,fontWeight:600}}>{fmt(calcLucro(form.itens))}</span></div>
          <div className="separator"/>
          <button className="btn btn-primary" onClick={salvar} disabled={syncing||!sessaoAtiva}>Registrar venda</button>
        </div>
      )}

      {tab==='historico'&&(
        <div className="card">
          {feirinha.length===0&&<div className="empty-state">Nenhuma venda na feirinha registrada</div>}
          {(()=>{
            const grupos={};
            feirinha.forEach(v=>{
              const key=v.participacao_id||v.local||'sem-participacao';
              if(!grupos[key]) grupos[key]={vendas:[],part:participacoes.find(p=>p.id===v.participacao_id)||null};
              grupos[key].vendas.push(v);
            });
            return Object.entries(grupos).sort((a,b)=>{
              const da=a[1].vendas[0]?.data||'';
              const db=b[1].vendas[0]?.data||'';
              return db.localeCompare(da);
            }).map(([key,{vendas:vs,part}])=>{
              const totalVendas=vs.reduce((a,v)=>a+v.total,0);
              const lucroVendas=vs.reduce((a,v)=>a+(v.lucro||0),0);
              const inscricao=part?.inscricao||0;
              const lucroLiquido=Math.max(0,lucroVendas-inscricao);
              const titulo=part?`${part.feira_nome} · ${part.data_inicio.split('-').reverse().join('/')}${part.data_fim&&part.data_fim!==part.data_inicio?' a '+part.data_fim.split('-').reverse().join('/'):''}`:vs[0]?.local||'Sem evento';
              return (
                <div key={key} style={{marginBottom:16,paddingBottom:16,borderBottom:'1px solid var(--cream-dark)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{titulo}</div>
                      <div style={{fontSize:12,color:'var(--text-muted)'}}>{vs.length} registro{vs.length!==1?'s':''}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontWeight:700,color:'var(--wine)'}}>{fmt(totalVendas)}</div>
                      {inscricao>0&&<div style={{fontSize:12,color:'var(--danger)'}}>inscrição − {fmt(inscricao)}</div>}
                      <div style={{fontSize:12,color:'var(--success)',fontWeight:600}}>lucro líquido {fmt(lucroLiquido)}</div>
                    </div>
                  </div>
                  {vs.map(v=>(
                    <div key={v.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0 4px 12px',borderLeft:'2px solid var(--cream-dark)',marginBottom:4,flexWrap:'wrap',gap:4}}>
                      <div style={{fontSize:12}}>
                        <span style={{color:'var(--text-muted)'}}>{v.data}</span>
                        <span style={{marginLeft:8}}>
                          {v.itens?.map((it,i)=>{const p=produtos.find(x=>x.id===it.produto_id);return <span key={i} style={{marginRight:6}}>{p?.nome||'?'} ×{it.qtd}</span>;})}
                        </span>
                      </div>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <span style={{fontSize:13,fontWeight:600,color:'var(--wine)'}}>{fmt(v.total)}</span>
                        <button className="btn btn-danger btn-sm" onClick={()=>excluir(v.id)}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              );
            });
          })()}
        </div>
      )}
    </div>
  );
}


// ── RELATÓRIO POR FEIRA ────────────────────────────────────────
function RelatorioFeira({ feirinha, participacoes, feirasCadastro, produtos }) {
  const [feiraId, setFeiraId] = useState('');
  const [partId, setPartId] = useState('');

  const partsDaFeira = useMemo(() =>
    participacoes.filter(p => !feiraId || p.feira_id === feiraId)
      .sort((a,b) => b.data_inicio.localeCompare(a.data_inicio)),
    [participacoes, feiraId]
  );

  // Resultado da participação ou feira selecionada
  const resultado = useMemo(() => {
    const partsAlvo = partId
      ? participacoes.filter(p => p.id === partId)
      : partsDaFeira;
    if (!partsAlvo.length && !feiraId) return null;

    const partIds = new Set(partsAlvo.map(p => p.id));
    const vendasFiltradas = feirinha.filter(v => partIds.has(v.participacao_id));

    // Produtos
    const contagem = {};
    vendasFiltradas.forEach(v => v.itens?.forEach(it => {
      if (!contagem[it.produto_id]) contagem[it.produto_id] = { qtd: 0, total: 0 };
      const p = produtos.find(x => x.id === it.produto_id);
      const qtd = parseInt(it.qtd) || 0;
      contagem[it.produto_id].qtd += qtd;
      contagem[it.produto_id].total += (parseFloat(it.preco_unitario) || p?.venda || 0) * qtd;
    }));
    const itens = Object.entries(contagem)
      .map(([id, {qtd, total}]) => ({ nome: produtos.find(p => p.id === id)?.nome || '?', qtd, total }))
      .sort((a,b) => b.qtd - a.qtd);

    const totalVendas = vendasFiltradas.reduce((a,v) => a + v.total, 0);
    const lucroBase = vendasFiltradas.reduce((a,v) => a + (v.lucro||0), 0);

    // Inscrições deduzidas uma vez por participação
    const contadas = new Set();
    const totalInscricoes = vendasFiltradas.reduce((a,v) => {
      if (v.participacao_id && !contadas.has(v.participacao_id)) {
        contadas.add(v.participacao_id);
        const p = participacoes.find(x => x.id === v.participacao_id);
        return a + (p?.inscricao || 0);
      }
      return a;
    }, 0);
    const lucroLiquido = Math.max(0, lucroBase - totalInscricoes);

    // Por participação (para comparativo)
    const porPart = partsAlvo.map(p => {
      const vs = feirinha.filter(v => v.participacao_id === p.id);
      const tot = vs.reduce((a,v) => a + v.total, 0);
      const luc = Math.max(0, vs.reduce((a,v) => a + (v.lucro||0), 0) - (p.inscricao||0));
      const ini = p.data_inicio?.split('-').reverse().join('/');
      const fim = p.data_fim&&p.data_fim!==p.data_inicio ? ` a ${p.data_fim.split('-').reverse().join('/')}` : '';
      return { label: `${ini}${fim}`, total: tot, lucro: luc, inscricao: p.inscricao||0, qtd: vs.length };
    }).filter(p => p.qtd > 0).sort((a,b) => b.total - a.total);

    return { itens, totalVendas, lucroBase, totalInscricoes, lucroLiquido, qtdRegistros: vendasFiltradas.length, porPart };
  }, [partId, feiraId, feirinha, participacoes, partsDaFeira, produtos]);

  function textoWhats() {
    if (!resultado) return '';
    const feira = feirasCadastro.find(f => f.id === feiraId);
    let t = `🏪 *RELATÓRIO DE FEIRA*
`;
    if (feira) t += `*${feira.nome}*
`;
    t += `━━━━━━━━━━━━━━━━━━━━
`;
    t += `📦 *O que foi vendido:*
`;
    resultado.itens.forEach(it => { t += `• ${it.nome}: ${it.qtd} un — ${fmt(it.total)}
`; });
    t += `━━━━━━━━━━━━━━━━━━━━
`;
    t += `💰 Faturamento: ${fmt(resultado.totalVendas)}
`;
    if (resultado.totalInscricoes > 0) t += `📋 Inscrição(ões): − ${fmt(resultado.totalInscricoes)}
`;
    t += `✅ Lucro líquido: ${fmt(resultado.lucroLiquido)}
`;
    return t;
  }

  return (
    <div>
      <div className="form-row cols2" style={{marginBottom:12}}>
        <div className="field">
          <label>Feira</label>
          <select value={feiraId} onChange={e=>{setFeiraId(e.target.value);setPartId('');}}>
            <option value="">Todas as feiras</option>
            {feirasCadastro.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Participação específica</label>
          <select value={partId} onChange={e=>setPartId(e.target.value)}>
            <option value="">Todas as participações</option>
            {partsDaFeira.map(p=>{
              const ini=p.data_inicio?.split('-').reverse().join('/');
              const fim=p.data_fim&&p.data_fim!==p.data_inicio?` a ${p.data_fim.split('-').reverse().join('/')}`:'' ;
              return <option key={p.id} value={p.id}>{ini}{fim}</option>;
            })}
          </select>
        </div>
      </div>

      {!resultado && <div className="empty-state" style={{marginTop:16}}>Selecione uma feira acima para ver o relatório.</div>}
      {resultado && resultado.itens.length === 0 && <div className="empty-state">Nenhuma venda encontrada para essa seleção.</div>}

      {resultado && resultado.itens.length > 0 && (
        <>
          <div className="metric-grid">
            <div className="metric"><div className="metric-label">Registros</div><div className="metric-value">{resultado.qtdRegistros}</div></div>
            <div className="metric"><div className="metric-label">Faturamento</div><div className="metric-value">{fmt(resultado.totalVendas)}</div></div>
            {resultado.totalInscricoes>0&&<div className="metric"><div className="metric-label">Inscrições</div><div className="metric-value" style={{color:'var(--danger)'}}>−{fmt(resultado.totalInscricoes)}</div></div>}
            <div className="metric">
              <div className="metric-label">Lucro líquido</div>
              <div className="metric-value" style={{color:resultado.lucroLiquido>0?'var(--success)':'var(--danger)'}}>{fmt(resultado.lucroLiquido)}</div>
              <div className="metric-sub">{resultado.lucroLiquido>0?'✅ Valeu a pena':'⚠ Prejuízo'}</div>
            </div>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button className="btn btn-gold" onClick={()=>window.print()}>🖨 Imprimir</button>
            <button className="btn btn-ghost" onClick={()=>{const msg=encodeURIComponent(textoWhats());window.open(`https://wa.me/?text=${msg}`,'_blank');}}>📲 WhatsApp</button>
          </div>

          <div className="card" style={{borderLeft:'4px solid var(--wine)'}}>
            <div className="card-title">Itens vendidos</div>
            {resultado.itens.map((it,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<resultado.itens.length-1?'1px solid var(--cream-dark)':'none'}}>
                <span style={{fontSize:15}}>{it.nome}</span>
                <div style={{display:'flex',gap:16,alignItems:'center'}}>
                  <span style={{fontSize:13,color:'var(--text-muted)'}}>{fmt(it.total)}</span>
                  <span style={{fontSize:22,fontWeight:700,color:'var(--wine)'}}>{it.qtd}<span style={{fontSize:13,fontWeight:400,color:'var(--text-muted)'}}> un</span></span>
                </div>
              </div>
            ))}
          </div>

          {resultado.porPart.length > 1 && (
            <div className="card">
              <div className="card-title">Comparativo por participação</div>
              <div className="scroll-x">
                <table>
                  <thead><tr><th>Período</th><th>Registros</th><th>Faturamento</th><th>Inscrição</th><th>Lucro líquido</th></tr></thead>
                  <tbody>
                    {resultado.porPart.map((p,i)=>(
                      <tr key={i}>
                        <td style={{fontWeight:600}}>{p.label}</td>
                        <td>{p.qtd}</td>
                        <td style={{color:'var(--wine)',fontWeight:600}}>{fmt(p.total)}</td>
                        <td style={{color:'var(--danger)'}}>{p.inscricao>0?`−${fmt(p.inscricao)}`:'—'}</td>
                        <td style={{color:p.lucro>0?'var(--success)':'var(--danger)',fontWeight:700}}>{fmt(p.lucro)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}


// ── RELATÓRIO ─────────────────────────────────────────────────────
function Relatorio() {
  const { arr: produtos } = useFirestore('produtos');
  const { arr: vendedores } = useFirestore('vendedores');
  const { arr: compradores } = useFirestore('compradores');
  const { arr: vendas } = useFirestore('vendas');
  const { arr: feirinha } = useFirestore('feirinha');
  const { arr: participacoes } = useFirestore('participacoes');
  const { arr: feirasCadastro } = useFirestore('feiras_cadastro');
  const [filtro, setFiltro] = useState({de:primeiroDiaMes(),ate:hoje(),canal:'todos',vendedor_id:''});
  const [gerado, setGerado] = useState(false);
  const [tab, setTab] = useState('resumo');

  const resultado = useMemo(() => {
    if(!gerado) return null;
    const {de,ate,canal,vendedor_id,feira_id} = filtro;

    const vf = vendas.filter(v=>{
      if(canal==='feirinha') return false;
      if(v.data<de||v.data>ate) return false;
      if(vendedor_id&&v.vendedor_id!==vendedor_id) return false;
      return true;
    });
    const ff = feirinha.filter(f=>{
      if(canal==='delivery') return false;
      if(feira_id){
        // filtro de feira sobrepõe datas
        const part=participacoes.find(p=>p.id===f.participacao_id);
        if(!part||part.feira_id!==feira_id) return false;
      } else {
        if(f.data<de||f.data>ate) return false;
      }
      return true;
    });

    const totalDelivery=vf.reduce((a,v)=>a+v.total,0);
    const lucroDelivery=vf.reduce((a,v)=>a+(v.lucro||0),0);
    const totalFeira=ff.reduce((a,f)=>a+f.total,0);
    const lucroFeira=ff.reduce((a,f)=>a+(f.lucro||0),0);
    const totalGeral=totalDelivery+totalFeira;
    const lucroGeral=lucroDelivery+lucroFeira;
    const pendente=vf.filter(v=>v.status==='pendente').reduce((a,v)=>a+v.total,0);
    const pago=vf.filter(v=>v.status==='pago').reduce((a,v)=>a+v.total,0);

    const prodC={},prodF={},prodL={};
    vf.forEach(v=>v.itens?.forEach(it=>{
      prodC[it.produto_id]=(prodC[it.produto_id]||0)+(parseInt(it.qtd)||0);
      const p=produtos.find(x=>x.id===it.produto_id);
      if(p){prodF[it.produto_id]=(prodF[it.produto_id]||0)+p.venda*(parseInt(it.qtd)||0);prodL[it.produto_id]=(prodL[it.produto_id]||0)+(p.venda-p.custo)*(parseInt(it.qtd)||0);}
    }));
    ff.forEach(f=>f.itens?.forEach(it=>{
      prodC[it.produto_id]=(prodC[it.produto_id]||0)+(parseInt(it.qtd)||0);
      const preco=parseFloat(it.preco_unitario)||0;
      const p=produtos.find(x=>x.id===it.produto_id);
      prodF[it.produto_id]=(prodF[it.produto_id]||0)+preco*(parseInt(it.qtd)||0);
      if(p) prodL[it.produto_id]=(prodL[it.produto_id]||0)+(preco-p.custo)*(parseInt(it.qtd)||0);
    }));

    const ranking=Object.entries(prodC)
      .map(([id,qtd])=>({id,qtd,faturamento:prodF[id]||0,lucro:prodL[id]||0,nome:produtos.find(p=>p.id===id)?.nome||'?'}))
      .sort((a,b)=>b.faturamento-a.faturamento);

    const rankingVendedores=vendedores.map(v=>({
      nome:v.nome,
      qtd:vf.filter(x=>x.vendedor_id===v.id).length,
      total:vf.filter(x=>x.vendedor_id===v.id).reduce((a,x)=>a+x.total,0),
      lucro:vf.filter(x=>x.vendedor_id===v.id).reduce((a,x)=>a+(x.lucro||0),0),
    })).filter(v=>v.qtd>0).sort((a,b)=>b.total-a.total);

    const rankingCompradores=compradores.map(c=>({
      nome:c.nome,cidade:c.cidade,
      qtd:vf.filter(v=>v.comprador_id===c.id).length,
      total:vf.filter(v=>v.comprador_id===c.id).reduce((a,v)=>a+v.total,0),
      pendente:vf.filter(v=>v.comprador_id===c.id&&v.status==='pendente').reduce((a,v)=>a+v.total,0),
    })).filter(c=>c.qtd>0).sort((a,b)=>b.total-a.total);

    const porDia={};
    vf.forEach(v=>{porDia[v.data]=(porDia[v.data]||0)+v.total;});
    ff.forEach(f=>{porDia[f.data]=(porDia[f.data]||0)+f.total;});
    const timeline=Object.entries(porDia).sort((a,b)=>a[0].localeCompare(b[0]));

    return {totalDelivery,lucroDelivery,totalFeira,lucroFeira,totalGeral,lucroGeral,pendente,pago,
      qtdDelivery:vf.length,qtdFeira:ff.length,ranking,rankingVendedores,rankingCompradores,timeline,
      vendasPendentes:vf.filter(v=>v.status==='pendente')};
  },[gerado,filtro,vendas,feirinha,produtos,vendedores,compradores,participacoes]);

  return (
    <div>
      <div className="page-title">📈 Relatório por período</div>
      <div className="card no-print">
        <div className="card-title">Filtros</div>
        <div className="form-row cols4">
          <div className="field"><label>De</label><input type="date" value={filtro.de} onChange={e=>setFiltro(f=>({...f,de:e.target.value}))}/></div>
          <div className="field"><label>Até</label><input type="date" value={filtro.ate} onChange={e=>setFiltro(f=>({...f,ate:e.target.value}))}/></div>
          <div className="field"><label>Canal</label>
            <select value={filtro.canal} onChange={e=>setFiltro(f=>({...f,canal:e.target.value}))}>
              <option value="todos">Todos os canais</option>
              <option value="delivery">Só delivery</option>
              <option value="feirinha">Só feirinha</option>
            </select>
          </div>
          <div className="field"><label>Vendedor</label>
            <select value={filtro.vendedor_id} onChange={e=>setFiltro(f=>({...f,vendedor_id:e.target.value}))}>
              <option value="">Todos</option>
              {vendedores.map(v=><option key={v.id} value={v.id}>{v.nome}</option>)}
            </select>
          </div>
          <div className="field"><label>Feira</label>
            <select value={filtro.feira_id||''} onChange={e=>setFiltro(f=>({...f,feira_id:e.target.value}))}>
              <option value="">Todas</option>
              {feirasCadastro.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={()=>{setGerado(true);setTab('resumo');}}>Gerar relatório</button>
          {resultado&&<button className="btn btn-gold" onClick={()=>window.print()}>🖨 Imprimir / PDF</button>}
          {resultado&&<button className="btn btn-ghost" onClick={()=>setGerado(false)}>Limpar</button>}
        </div>
      </div>

      {!resultado&&<div className="card" style={{textAlign:'center',padding:'2.5rem'}}><div style={{fontSize:36,marginBottom:12}}>☕</div><div style={{color:'var(--text-muted)',fontSize:14}}>Selecione o período e clique em <strong>Gerar relatório</strong></div></div>}

      {resultado&&(
        <>
          <div className="tab-bar no-print">
            {['resumo','produtos','vendedores','compradores','pendencias'].map(t=>(
              <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
                {t==='resumo'?'📊 Resumo':t==='produtos'?'☕ Produtos':t==='vendedores'?'👤 Vendedores':t==='compradores'?'🛍 Clientes':t==='pendencias'?'⏳ Pendências':'🏪 Feira'}
              </button>
            ))}
          </div>

          {tab==='resumo'&&(
            <>
              <div className="metric-grid">

                      {resultado.rankingVendedores.map((v,i)=>(

                          <td style={{fontWeight:600}}>{v.nome}</td>

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dashboard({ syncing, setSyncing }) {
  const { arr: produtos } = useFirestore('produtos');
  const { arr: vendas } = useFirestore('vendas');
  const { arr: feirinha } = useFirestore('feirinha');
  const { arr: participacoes } = useFirestore('participacoes');
  const { arr: feirasCadastro } = useFirestore('feiras_cadastro');
  const { docs: estoqueDelivery } = useFirestore('estoque_delivery');
  const { docs: estoqueFeirinha } = useFirestore('estoque_feirinha');
  const { arr: vendedores } = useFirestore('vendedores');
  const [recalcInfo, setRecalcInfo] = useState(null);
  const [recalcDone, setRecalcDone] = useState(false);
  const [periodo, setPeriodo] = useState({de:'',ate:''});
  const [filtroAtivo, setFiltroAtivo] = useState(false);

  // Detectar vendas com lucro desatualizado (sem desconto aplicado)
  const vendasDesatualizadas = useMemo(() => {
    if (!produtos.length || !vendas.length) return [];
    return vendas.filter(v => {
      // Tem desconto mas lucro não foi recalculado com ele
      if (v.desconto > 0 && v.lucro !== undefined) {
        const lucroBase = (v.itens||[]).reduce((acc, it) => {
          const p = produtos.find(x => x.id === it.produto_id);
          return acc + (p ? (p.venda - p.custo) * (parseInt(it.qtd)||0) : 0);
        }, 0);
        const lucroEsperado = Math.max(0, lucroBase - v.desconto);
        return Math.abs((v.lucro||0) - lucroEsperado) > 0.01;
      }
      // Não tem campo lucro salvo
      if (v.lucro === undefined || v.lucro === null) return true;
      return false;
    });
  }, [vendas, produtos]);

  async function recalcularLucros() {
    if (!vendasDesatualizadas.length) return;
    setSyncing(true);
    let count = 0;
    for (const v of vendasDesatualizadas) {
      const lucroBase = (v.itens||[]).reduce((acc, it) => {
        const p = produtos.find(x => x.id === it.produto_id);
        return acc + (p ? (p.venda - p.custo) * (parseInt(it.qtd)||0) : 0);
      }, 0);
      const desconto = v.desconto || 0;
      const lucro = Math.max(0, lucroBase - desconto);
      const subtotal = (v.itens||[]).reduce((acc, it) => {
        const p = produtos.find(x => x.id === it.produto_id);
        return acc + (p ? p.venda * (parseInt(it.qtd)||0) : 0);
      }, 0);
      await saveDoc('vendas', v.id, { ...v, lucro, subtotal: v.subtotal || subtotal });
      count++;
    }
    setSyncing(false);
    setRecalcDone(true);
    setRecalcInfo(`${count} venda${count !== 1 ? 's' : ''} recalculada${count !== 1 ? 's' : ''}!`);
    setTimeout(() => setRecalcInfo(null), 4000);
  }

  const vendasFiltradas = useMemo(()=> filtroAtivo && (periodo.de||periodo.ate)
    ? vendas.filter(v=>(!periodo.de||v.data>=periodo.de)&&(!periodo.ate||v.data<=periodo.ate))
    : vendas, [vendas,periodo,filtroAtivo]);
  const feirasFiltradas = useMemo(()=>{
    if(!filtroAtivo) return feirinha;
    // Se participação selecionada, sobrepõe filtro de data
    if(periodo.participacao_id){
      return feirinha.filter(f=>f.participacao_id===periodo.participacao_id);
    }
    return feirinha.filter(f=>{
      if(periodo.de&&f.data<periodo.de) return false;
      if(periodo.ate&&f.data>periodo.ate) return false;
      return true;
    });
  },[feirinha,periodo,filtroAtivo,participacoes]);

  const totalVendas=vendasFiltradas.reduce((a,v)=>a+v.total,0);
  const lucroDelivery=vendasFiltradas.reduce((a,v)=>a+(v.lucro||0),0);
  const totalFeiras=feirasFiltradas.reduce((a,f)=>a+f.total,0);
  const lucroFeirasBase=feirasFiltradas.reduce((a,f)=>a+(f.lucro||0),0);
  const partContadas=new Set();
  const totalInscricoesDash=feirasFiltradas.reduce((a,f)=>{
    if(f.participacao_id&&!partContadas.has(f.participacao_id)){
      partContadas.add(f.participacao_id);
      const part=participacoes.find(p=>p.id===f.participacao_id);
      return a+(part?.inscricao||0);
    }
    return a;
  },0);
  const lucroFeiras=Math.max(0,lucroFeirasBase-totalInscricoesDash);
  const totalGeral=totalVendas+totalFeiras;
  const totalLucro=lucroDelivery+lucroFeiras;
  const pendentes=vendasFiltradas.filter(v=>v.status==='pendente').reduce((a,v)=>a+v.total,0);
  const pendentesQtd=vendasFiltradas.filter(v=>v.status==='pendente').length;

  const rankVendedores=vendedores.map(v=>({
    nome:v.nome,
    qtd:vendas.filter(vd=>vd.vendedor_id===v.id).length,
    total:vendas.filter(vd=>vd.vendedor_id===v.id).reduce((a,vd)=>a+vd.total,0),
  })).filter(v=>v.qtd>0).sort((a,b)=>b.total-a.total);

  const prodMaisVendido=(()=>{
    const c={};
    vendasFiltradas.forEach(v=>v.itens?.forEach(it=>{c[it.produto_id]=(c[it.produto_id]||0)+(parseInt(it.qtd)||0);}));
    feirasFiltradas.forEach(f=>f.itens?.forEach(it=>{c[it.produto_id]=(c[it.produto_id]||0)+(parseInt(it.qtd)||0);}));
    const max=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
    if(!max) return null;
    const p=produtos.find(x=>x.id===max[0]);
    return p?{nome:p.nome,qtd:max[1]}:null;
  })();

  return (
    <div>
      <div className="page-title">📊 Painel geral</div>
      <div className="card" style={{marginBottom:12,padding:'0.75rem 1.25rem'}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,flexWrap:'wrap'}}>
          <div className="field" style={{margin:0}}>
            <label>De</label>
            <input type="date" value={periodo.de} onChange={e=>setPeriodo(p=>({...p,de:e.target.value}))} style={{padding:'6px 8px',fontSize:13}}/>
          </div>
          <div className="field" style={{margin:0}}>
            <label>Até</label>
            <input type="date" value={periodo.ate} onChange={e=>setPeriodo(p=>({...p,ate:e.target.value}))} style={{padding:'6px 8px',fontSize:13}}/>
          </div>
          <div className="field" style={{margin:0}}>
            <label>Feira / Participação</label>
            <select value={periodo.participacao_id||''} onChange={e=>setPeriodo(p=>({...p,participacao_id:e.target.value,feira_id:''}))} style={{padding:'6px 8px',fontSize:13}}>
              <option value="">Todas</option>
              {[...participacoes].sort((a,b)=>b.data_inicio.localeCompare(a.data_inicio)).map(p=>{
                const ini=p.data_inicio?.split('-').reverse().join('/');
                const fim=p.data_fim&&p.data_fim!==p.data_inicio?` a ${p.data_fim.split('-').reverse().join('/')}`:'' ;
                return <option key={p.id} value={p.id}>{p.feira_nome} · {ini}{fim}</option>;
              })}
            </select>
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>setFiltroAtivo(true)} style={{marginBottom:1}}>Filtrar</button>
          {filtroAtivo&&<button className="btn btn-ghost btn-sm" onClick={()=>{setFiltroAtivo(false);setPeriodo({de:'',ate:'',participacao_id:'',feira_id:''});}} style={{marginBottom:1}}>Ver tudo</button>}
          {filtroAtivo&&<span style={{fontSize:12,color:'var(--text-muted)',alignSelf:'center'}}>
            {periodo.de&&periodo.ate ? `${periodo.de.split('-').reverse().join('/')} a ${periodo.ate.split('-').reverse().join('/')}` : 'Período filtrado'}
          </span>}
        </div>
      </div>

      {vendasDesatualizadas.length > 0 && !recalcDone && (
        <div className="card" style={{borderLeft:'4px solid var(--warning)',background:'#FFFBF0',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontWeight:700,color:'var(--warning)',marginBottom:2}}>⚠ Lucro desatualizado</div>
              <div style={{fontSize:13,color:'var(--text-muted)'}}>
                {vendasDesatualizadas.length} venda{vendasDesatualizadas.length!==1?'s':''} com lucro calculado sem desconto aplicado.
              </div>
            </div>
            <button className="btn btn-gold" onClick={recalcularLucros} disabled={syncing}>
              {syncing ? 'Recalculando...' : 'Recalcular agora'}
            </button>
          </div>
        </div>
      )}
      {recalcInfo && (
        <div className="alert alert-success" style={{marginBottom:12}}>✅ {recalcInfo}</div>
      )}

      <div className="metric-grid">
        <div className="metric"><div className="metric-label">Faturamento total</div><div className="metric-value">{fmt(totalGeral)}</div><div className="metric-sub">delivery + feirinha</div></div>
        <div className="metric"><div className="metric-label">Lucro real</div><div className="metric-value" style={{color:'var(--success)'}}>{fmt(totalLucro)}</div><div className="metric-sub">descontado custo</div></div>
        <div className="metric"><div className="metric-label">A receber</div><div className="metric-value" style={{color:pendentesQtd>0?'var(--warning)':'var(--success)'}}>{fmt(pendentes)}</div><div className="metric-sub">{pendentesQtd} pendente{pendentesQtd!==1?'s':''}</div></div>
        <div className="metric"><div className="metric-label">Vendas delivery</div><div className="metric-value">{vendas.length}</div><div className="metric-sub">{fmt(totalVendas)}</div></div>
        <div className="metric"><div className="metric-label">Vendas feirinha</div><div className="metric-value">{feirinha.length}</div><div className="metric-sub">{fmt(totalFeiras)}</div></div>
        <div className="metric"><div className="metric-label">Produtos ativos</div><div className="metric-value">{produtos.filter(p=>p.ativo).length}</div><div className="metric-sub">de {produtos.length} cadastrados</div></div>
      </div>

      {prodMaisVendido&&(
        <div className="card" style={{borderLeft:'4px solid var(--gold)'}}>
          <div style={{fontWeight:700,color:'var(--wine)',marginBottom:2}}>⭐ Produto mais vendido</div>
          <div style={{fontSize:16,fontWeight:600}}>{prodMaisVendido.nome}</div>
          <div style={{fontSize:13,color:'var(--text-muted)'}}>{prodMaisVendido.qtd} unidades no total</div>
        </div>
      )}

      {rankVendedores.length>0&&(
        <div className="card">
          <div className="card-title">Desempenho por vendedor</div>
          <table>
            <thead><tr><th>Vendedor</th><th>Qtd vendas</th><th>Total vendido</th></tr></thead>
            <tbody>
              {rankVendedores.map(v=>(
                <tr key={v.nome}>
                  <td style={{fontWeight:600}}>{v.nome}</td>
                  <td><span className="badge badge-wine">{v.qtd}</span></td>
                  <td style={{fontWeight:700,color:'var(--wine)'}}>{fmt(v.total)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {produtos.length>0&&(
        <div className="card">
          <div className="card-title">Estoque atual</div>
          <div className="scroll-x">
            <table>
              <thead><tr><th>Produto</th><th>Margem</th><th>Stk Delivery</th><th>Stk Feirinha</th><th>Status</th></tr></thead>
              <tbody>
                {produtos.map(p=>{
                  const margem=p.custo>0?((p.venda-p.custo)/p.venda*100).toFixed(1)+'%':'—';
                  const edQtd=estoqueDelivery[p.id]?.qtd??0;
                  const efQtd=estoqueFeirinha[p.id]?.qtd??0;
                  return (
                    <tr key={p.id} style={{opacity:p.ativo?1:0.45}}>
                      <td style={{fontWeight:600}}>{p.nome}</td>
                      <td><span className={`badge ${parseFloat(margem)>30?'badge-green':'badge-gold'}`}>{margem}</span></td>
                      <td style={{color:edQtd===0?'var(--danger)':'var(--text)'}}>{edQtd}</td>
                      <td style={{color:efQtd===0?'var(--danger)':'var(--text)'}}>{efQtd}</td>
                      <td>{p.ativo?<span className="badge badge-green">Ativo</span>:<span className="badge badge-red">Inativo</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {produtos.length===0&&vendas.length===0&&(
        <div className="card" style={{textAlign:'center',padding:'2.5rem'}}>
          <div style={{fontSize:40,marginBottom:12}}>☕</div>
          <div style={{fontWeight:700,fontSize:16,color:'var(--wine)',marginBottom:6}}>Bem-vinda ao Café & Tal!</div>
          <div style={{color:'var(--text-muted)',fontSize:14}}>Comece cadastrando seus produtos, vendedores e compradores.</div>
        </div>
      )}
    </div>
  );
}

// ── FEIRAS TAB ────────────────────────────────────────────────────
function FeirasTab({ syncing, setSyncing }) {
  const { arr: feiras, loading } = useFirestore('feiras_cadastro');
  const { arr: participacoes } = useFirestore('participacoes');
  const [form, setForm] = useState({ nome: '', local: '', recorrente: false });
  const [editando, setEditando] = useState(null);
  const [partForm, setPartForm] = useState({ feira_id: '', data_inicio: hoje(), data_fim: '', inscricao: '' });
  const [editandoPart, setEditandoPart] = useState(null);
  const [feiraAberta, setFeiraAberta] = useState(null);
  const [alert, setAlert] = useState(null);

  function showAlert(tipo, msg) { setAlert({tipo, msg}); setTimeout(() => setAlert(null), 3000); }

  async function salvarFeira() {
    const nome = form.nome.trim();
    if (!nome) return showAlert('danger', 'Informe o nome da feira.');
    setSyncing(true);
    await saveDoc('feiras_cadastro', uid(), { nome, local: form.local.trim(), recorrente: form.recorrente });
    setForm({ nome: '', local: '', recorrente: false });
    showAlert('success', 'Feira cadastrada!');
    setSyncing(false);
  }

  async function salvarEdicaoFeira() {
    if (!editando.nome.trim()) return showAlert('danger', 'Informe o nome.');

    await deleteDocById('feiras_cadastro', id);

      ...editandoPart,
      data_fim: editandoPart.data_fim || editandoPart.data_inicio,
      inscricao: parseFloat(editandoPart.inscricao) || 0,
