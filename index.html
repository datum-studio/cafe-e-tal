    setEditandoPart(null);
    showAlert('success', 'Participação atualizada!');
    setSyncing(false);
  }

  async function excluirParticipacao(id) {
    if (!confirm('Excluir participação?')) return;
    setSyncing(true);
    await deleteDocById('participacoes', id);
    setSyncing(false);
  }

  function labelParticipacao(p) {
    const ini = p.data_inicio?.split('-').reverse().join('/');
    const fim = p.data_fim && p.data_fim !== p.data_inicio ? p.data_fim.split('-').reverse().join('/') : null;
    return `${p.feira_nome}${fim ? ` · ${ini} a ${fim}` : ` · ${ini}`} · ${fmt(p.inscricao)}`;
  }

  if (loading) return <div className="loading-screen"><div className="spinner"/></div>;

  return (
    <div>
      {alert && <div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}

      {/* Cadastro de feira */}
      <div className="card">
        <div className="card-title">Nova feira / evento</div>
        <div className="form-row cols2">
          <div className="field"><label>Nome</label><input value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Feira da Orla"/></div>
          <div className="field"><label>Local</label><input value={form.local} onChange={e=>setForm(f=>({...f,local:e.target.value}))} placeholder="Ex: Orla de Juazeiro"/></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <label className="toggle"><input type="checkbox" checked={form.recorrente} onChange={e=>setForm(f=>({...f,recorrente:e.target.checked}))}/><span className="toggle-slider"/></label>
          <span style={{fontSize:13,color:'var(--text-muted)'}}>Feira recorrente</span>
        </div>
        <button className="btn btn-primary" onClick={salvarFeira} disabled={syncing}>Cadastrar feira</button>
      </div>

      {editando && (
        <div className="card" style={{borderColor:'var(--gold)'}}>
          <div className="card-title">Editar feira</div>
          <div className="form-row cols2">
            <div className="field"><label>Nome</label><input value={editando.nome} onChange={e=>setEditando(x=>({...x,nome:e.target.value}))}/></div>
            <div className="field"><label>Local</label><input value={editando.local} onChange={e=>setEditando(x=>({...x,local:e.target.value}))}/></div>

          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <label className="toggle"><input type="checkbox" checked={editando.recorrente} onChange={e=>setEditando(x=>({...x,recorrente:e.target.checked}))}/><span className="toggle-slider"/></label>
            <span style={{fontSize:13,color:'var(--text-muted)'}}>Recorrente</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-gold" onClick={salvarEdicaoFeira} disabled={syncing}>Salvar</button>
            <button className="btn btn-ghost" onClick={()=>setEditando(null)}>Cancelar</button>
          </div>
        </div>
      )}

      {/* Lista de feiras */}
      <div className="card">
        <div className="card-title">Feiras cadastradas</div>
        {feiras.length === 0
          ? <div className="empty-state">Nenhuma feira cadastrada.</div>
          : [...feiras].sort((a,b)=>a.nome.localeCompare(b.nome)).map(f => {
              const parts = participacoes.filter(p => p.feira_id === f.id).sort((a,b)=>b.data_inicio.localeCompare(a.data_inicio));
              const aberta = feiraAberta === f.id;

function CidadesTab({ syncing, setSyncing }) {

  const { arr: cidades, loading } = useFirestore('cidades');
  const { arr: compradores } = useFirestore('compradores');
  const [nome, setNome] = useState('');
  const [editando, setEditando] = useState(null);
  const [alert, setAlert] = useState(null);
  const [importando, setImportando] = useState(false);

  function showAlert(tipo, msg) { setAlert({tipo, msg}); setTimeout(() => setAlert(null), 2500); }

  // Detectar cidades nos compradores que ainda não estão no cadastro
  const cidadesNaoCadastradas = useMemo(() => {
    const cadastradas = new Set(cidades.map(c => c.nome.toLowerCase().trim()));
    const encontradas = new Set();
    compradores.forEach(c => {
      const cidade = c.cidade?.trim();
      if (cidade && !cadastradas.has(cidade.toLowerCase())) {
        encontradas.add(cidade);
      }
    });
    return [...encontradas].sort();
  }, [cidades, compradores]);

  async function importarTodasCidades() {
    if (cidadesNaoCadastradas.length === 0) return;
    setImportando(true);
    setSyncing(true);
    for (const cidade of cidadesNaoCadastradas) {
      await saveDoc('cidades', uid(), { nome: cidade });
    }
    setSyncing(false);
    setImportando(false);
    showAlert('success', `${cidadesNaoCadastradas.length} cidade(s) importada(s) com sucesso!`);
  }

  async function importarUmaCidade(cidade) {
    setSyncing(true);
    await saveDoc('cidades', uid(), { nome: cidade });
    setSyncing(false);
    showAlert('success', `"${cidade}" importada!`);
  }

  async function salvar() {
    const nomeLimpo = nome.trim();
    if (!nomeLimpo) return showAlert('danger', 'Informe o nome da cidade.');
    if (cidades.some(c => c.nome.toLowerCase() === nomeLimpo.toLowerCase()))
      return showAlert('danger', 'Cidade já cadastrada.');
    setSyncing(true);
    await saveDoc('cidades', uid(), { nome: nomeLimpo });
    setNome('');
    showAlert('success', 'Cidade cadastrada!');
    setSyncing(false);
  }

  async function salvarEdicao() {
    const nomeLimpo = editando.nome.trim();
    if (!nomeLimpo) return showAlert('danger', 'Informe o nome.');
    if (cidades.some(c => c.id !== editando.id && c.nome.toLowerCase() === nomeLimpo.toLowerCase()))
      return showAlert('danger', 'Já existe uma cidade com esse nome.');
    setSyncing(true);
    await saveDoc('cidades', editando.id, { nome: nomeLimpo });
    // Atualizar compradores que usavam o nome antigo
    const compsParaAtualizar = compradores.filter(c => c.cidade === editando.nomeOriginal);
    for (const c of compsParaAtualizar) {
      await saveDoc('compradores', c.id, { ...c, cidade: nomeLimpo });
    }
    setEditando(null);
    showAlert('success', `Cidade atualizada! ${compsParaAtualizar.length} comprador(es) atualizado(s).`);
    setSyncing(false);
  }

  async function excluir(cidade) {
    const emUso = compradores.filter(c => c.cidade === cidade.nome).length;
    if (emUso > 0) return showAlert('danger', `Não é possível excluir: ${emUso} comprador(es) cadastrado(s) nessa cidade.`);
    if (!confirm(`Excluir "${cidade.nome}"?`)) return;
    setSyncing(true);
    await deleteDocById('cidades', cidade.id);
    setSyncing(false);
  }

  if (loading) return <div className="loading-screen"><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-title">📍 Cidades</div>
      {alert && <div className={`alert alert-${alert.tipo}`}>{alert.msg}</div>}

      {cidadesNaoCadastradas.length > 0 && (
        <div className="card" style={{borderLeft:'4px solid var(--warning)',background:'#FFFBF0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8,marginBottom:12}}>
            <div>
              <div style={{fontWeight:700,color:'var(--warning)',marginBottom:2}}>⚠ Cidades detectadas nos compradores</div>
              <div style={{fontSize:13,color:'var(--text-muted)'}}>
                {cidadesNaoCadastradas.length} cidade(s) usada(s) em compradores ainda não estão no cadastro.<br/>
                Importe-as para garantir o funcionamento correto do módulo de Produção.
              </div>
            </div>
            <button className="btn btn-gold" onClick={importarTodasCidades} disabled={importando||syncing}>
              {importando ? 'Importando...' : `Importar todas (${cidadesNaoCadastradas.length})`}
            </button>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {cidadesNaoCadastradas.map(c => (
              <div key={c} style={{display:'flex',alignItems:'center',gap:6,background:'var(--warning-bg)',borderRadius:7,padding:'4px 10px'}}>
                <span style={{fontSize:13,fontWeight:600,color:'var(--warning)'}}>{c}</span>
                <button
                  onClick={()=>importarUmaCidade(c)}
                  disabled={syncing}
                  style={{background:'none',border:'none',cursor:'pointer',color:'var(--warning)',fontSize:14,padding:0,lineHeight:1}}
                  title="Importar só esta">+</button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-title">Nova cidade</div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
          <div className="field" style={{ flex: 1, margin: 0 }}>
            <label>Nome da cidade</label>
            <input
              value={nome}
              onChange={e => setNome(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && salvar()}
              placeholder="Ex: Juazeiro - BA"
            />
          </div>
          <button className="btn btn-primary" onClick={salvar} disabled={syncing}>Cadastrar</button>
        </div>
      </div>

      {editando && (
        <div className="card" style={{ borderColor: 'var(--gold)' }}>
          <div className="card-title">Editar cidade</div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
            <div className="field" style={{ flex: 1, margin: 0 }}>
              <label>Nome</label>
              <input
                value={editando.nome}
                onChange={e => setEditando(x => ({ ...x, nome: e.target.value }))}
                onKeyDown={e => e.key === 'Enter' && salvarEdicao()}
              />
            </div>
            <button className="btn btn-gold" onClick={salvarEdicao} disabled={syncing}>Salvar</button>
            <button className="btn btn-ghost" onClick={() => setEditando(null)}>Cancelar</button>
          </div>
          {compradores.filter(c => c.cidade === editando.nomeOriginal).length > 0 && (
            <div style={{ marginTop: 8, fontSize: 12, color: 'var(--text-muted)' }}>
              ⚠ {compradores.filter(c => c.cidade === editando.nomeOriginal).length} comprador(es) serão atualizados automaticamente.
            </div>
          )}
        </div>
      )}

      <div className="card">
        {cidades.length === 0
          ? <div className="empty-state">Nenhuma cidade cadastrada.<br/>Cadastre as cidades antes de adicionar compradores.</div>
          : (
            <table>
              <thead>
                <tr>
                  <th>Cidade</th>
                  <th>Compradores</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {[...cidades].sort((a, b) => a.nome.localeCompare(b.nome)).map(c => {
                  const qtdComps = compradores.filter(x => x.cidade === c.nome).length;
                  return (
                    <tr key={c.id}>
                      <td style={{ fontWeight: 600 }}>{c.nome}</td>
                      <td>
                        {qtdComps > 0
                          ? <span className="badge badge-wine">{qtdComps} comprador{qtdComps !== 1 ? 'es' : ''}</span>
                          : <span style={{ color: 'var(--text-muted)', fontSize: 12 }}>Nenhum</span>
                        }
                      </td>
                      <td style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setEditando({ ...c, nomeOriginal: c.nome })}>✏</button>
                        <button className="btn btn-danger btn-sm" onClick={() => excluir(c)}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )
        }
      </div>
    </div>
  );
}

// ── PRODUÇÃO POR CIDADE ───────────────────────────────────────────
function Producao() {
  const { arr: produtos } = useFirestore('produtos');
  const { arr: compradores } = useFirestore('compradores');
  const { arr: vendas } = useFirestore('vendas');

  const cidades = useMemo(() => {
    const set = new Set(compradores.map(c => c.cidade).filter(Boolean));
    return [...set].sort();
  }, [compradores]);

  const [filtro, setFiltro] = useState({ cidade: '', de: primeiroDiaMes(), ate: hoje(), status: 'todos' });
  const [gerado, setGerado] = useState(false);

  const resultado = useMemo(() => {
    if (!gerado || !filtro.cidade) return null;

    // Compradores da cidade selecionada
    const compsDaCidade = compradores.filter(c => c.cidade === filtro.cidade);
    const compIds = new Set(compsDaCidade.map(c => c.id));

    // Vendas no período para essa cidade
    const vendasFiltradas = vendas.filter(v => {
      if (v.data < filtro.de || v.data > filtro.ate) return false;
      if (!compIds.has(v.comprador_id)) return false;
      if (filtro.status !== 'todos' && v.status !== filtro.status) return false;
      return true;
    });

    if (vendasFiltradas.length === 0) return { itens: [], vendas: [], total: 0 };

    // Somar produtos
    const contagem = {};
    vendasFiltradas.forEach(v => {
      v.itens?.forEach(it => {
        if (!it.produto_id || !it.qtd) return;
        if (!contagem[it.produto_id]) contagem[it.produto_id] = { qtd: 0, total: 0 };
        const p = produtos.find(x => x.id === it.produto_id);
        const qtd = parseInt(it.qtd) || 0;
        contagem[it.produto_id].qtd += qtd;
        contagem[it.produto_id].total += (p?.venda || 0) * qtd;
      });
    });

    const itens = Object.entries(contagem)
      .map(([id, { qtd, total }]) => ({
        id, qtd, total,
        nome: produtos.find(p => p.id === id)?.nome || '?',
      }))
      .sort((a, b) => b.qtd - a.qtd);

    const totalGeral = vendasFiltradas.reduce((a, v) => a + (v.total || 0), 0);

    // Detalhe por comprador
    const porComprador = compsDaCidade
      .map(c => {
        const vs = vendasFiltradas.filter(v => v.comprador_id === c.id);
        if (vs.length === 0) return null;
        const itensComp = {};
        vs.forEach(v => v.itens?.forEach(it => {
          if (!it.produto_id) return;
          itensComp[it.produto_id] = (itensComp[it.produto_id] || 0) + (parseInt(it.qtd) || 0);
        }));
        return {
          nome: c.nome,
          total: vs.reduce((a, v) => a + (v.total || 0), 0),
          status: vs.every(v => v.status === 'pago') ? 'pago' : vs.some(v => v.status === 'pendente') ? 'pendente' : 'misto',
          itens: Object.entries(itensComp).map(([id, qtd]) => ({
            nome: produtos.find(p => p.id === id)?.nome || '?', qtd
          })).sort((a, b) => b.qtd - a.qtd),
        };
      })
      .filter(Boolean)
      .sort((a, b) => b.total - a.total);

    return { itens, vendas: vendasFiltradas, total: totalGeral, porComprador };
  }, [gerado, filtro, vendas, compradores, produtos]);

  function textoWhats() {
    if (!resultado) return '';
    let t = `📦 *LISTA DE PRODUÇÃO — ${filtro.cidade.toUpperCase()}*
`;
    t += `📅 ${filtro.de.split('-').reverse().join('/')} a ${filtro.ate.split('-').reverse().join('/')}
`;
    t += `━━━━━━━━━━━━━━━━━━━━
`;
    resultado.itens.forEach(it => { t += `• ${it.nome}: *${it.qtd} un*
`; });
    t += `━━━━━━━━━━━━━━━━━━━━
`;
    t += `🛒 ${resultado.vendas.length} pedido${resultado.vendas.length !== 1 ? 's' : ''} · Total ${fmt(resultado.total)}
`;
    t += `
👤 *Por cliente:*
`;
    resultado.porComprador.forEach(c => {
      t += `\n${c.nome} (${fmt(c.total)})\n`;
      c.itens.forEach(it => { t += `  - ${it.nome}: ${it.qtd} un\n`; });
    });
    return t;
  }

  return (
    <div>
      <div className="page-title">📦 Lista de produção</div>

      <div className="card">
        <div className="card-title">Filtros</div>
        <div className="form-row cols2">
          <div className="field">
            <label>Cidade</label>
            <select value={filtro.cidade} onChange={e => { setFiltro(f => ({ ...f, cidade: e.target.value })); setGerado(false); }}>
              <option value="">Selecionar cidade...</option>
              {cidades.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Status das vendas</label>
            <select value={filtro.status} onChange={e => setFiltro(f => ({ ...f, status: e.target.value }))}>
              <option value="todos">Todas</option>
              <option value="pendente">Só pendentes</option>
              <option value="pago">Só pagas</option>
            </select>
          </div>
          <div className="field"><label>De</label><input type="date" value={filtro.de} onChange={e => setFiltro(f => ({ ...f, de: e.target.value }))}/></div>
          <div className="field"><label>Até</label><input type="date" value={filtro.ate} onChange={e => setFiltro(f => ({ ...f, ate: e.target.value }))}/></div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-primary" onClick={() => setGerado(true)} disabled={!filtro.cidade}>Gerar lista</button>
          {resultado && <button className="btn btn-gold" onClick={() => window.print()}>🖨 Imprimir / PDF</button>}
          {resultado && resultado.itens.length > 0 && (
            <button className="btn btn-ghost" onClick={() => {
              const msg = encodeURIComponent(textoWhats());
              window.open(`https://wa.me/?text=${msg}`, '_blank');
            }}>📲 Enviar WhatsApp</button>
          )}
        </div>
      </div>

      {gerado && !filtro.cidade && (
        <div className="card"><div className="empty-state">Selecione uma cidade para gerar a lista.</div></div>
      )}

      {resultado && resultado.itens.length === 0 && (
        <div className="card"><div className="empty-state">Nenhuma venda encontrada para <strong>{filtro.cidade}</strong> no período.</div></div>
      )}

      {resultado && resultado.itens.length > 0 && (
        <>
          {/* Cabeçalho simples */}
          <div style={{marginBottom:12,fontSize:13,color:'var(--text-muted)'}}>
            {filtro.cidade} · {resultado.vendas.length} pedido{resultado.vendas.length!==1?'s':''} · {filtro.de.split('-').reverse().join('/')} a {filtro.ate.split('-').reverse().join('/')}
          </div>

          {/* Lista de produção — limpa e direta */}
          <div className="card" style={{borderLeft:'4px solid var(--wine)'}}>
            <div className="card-title">O que produzir</div>
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {resultado.itens.map((it, i) => (
                <div key={it.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<resultado.itens.length-1?'1px solid var(--cream-dark)':'none'}}>
                  <span style={{fontSize:15,color:'var(--text)'}}>{it.nome}</span>
                  <span style={{fontSize:22,fontWeight:700,color:'var(--wine)',minWidth:70,textAlign:'right'}}>{it.qtd} <span style={{fontSize:13,fontWeight:400,color:'var(--text-muted)'}}>un</span></span>
                </div>
              ))}
            </div>
          </div>

          {/* Detalhe por comprador */}
          <div className="card">
            <div className="card-title">Por cliente</div>
            {resultado.porComprador.map((c, i) => (
              <div key={i} style={{marginBottom:12,paddingBottom:12,borderBottom:i<resultado.porComprador.length-1?'1px solid var(--cream-dark)':'none'}}>
                <div style={{fontWeight:700,marginBottom:5}}>{c.nome}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {c.itens.map((it, j) => (
                    <span key={j} style={{background:'var(--cream-dark)',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:600}}>
                      {it.nome} <span style={{color:'var(--wine)'}}>×{it.qtd}</span>
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── INSTALL PWA BUTTON ───────────────────────────────────────────
function InstallButton() {
  const [prompt, setPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);

  useEffect(()=>{
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      setPrompt(e);
    });
    window.addEventListener('appinstalled', () => {
      setInstalled(true);
      setPrompt(null);
    });
  },[]);

  if(installed || !prompt) return null;
  return (
    <button onClick={async()=>{ prompt.prompt(); const r=await prompt.userChoice; if(r.outcome==='accepted') setPrompt(null); }}
      style={{background:'var(--gold)',color:'var(--wine)',border:'none',borderRadius:7,padding:'5px 10px',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
      ⬇ Instalar
    </button>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────
function App() {
  const [ready, setReady] = useState(!!window._firebaseReady);
  const [page, setPage] = useState('dashboard');
  const [syncing, setSyncing] = useState(false);

  useEffect(()=>{
    // Firebase pode já ter carregado antes do React montar
    if(window._firebaseReady){
      setReady(true);
      return;
    }
    const handler = () => setReady(true);
    window.addEventListener('firebaseReady', handler, {once:true});
    // Timeout de segurança: tenta de novo após 3s
    const t = setTimeout(()=>{
      if(window._firebaseReady) setReady(true);
    }, 3000);
    return () => { clearTimeout(t); window.removeEventListener('firebaseReady', handler); };
  },[]);

  const pages=[
    {id:'dashboard',  icon:'📊', label:'Painel',      sub:'Visão geral',   short:'Painel'},
    {id:'vendas',     icon:'🛒', label:'Vendas',      sub:'Delivery',      short:'Vendas'},
    {id:'feirinha',   icon:'🏪', label:'Feirinha',    sub:'Venda direta',  short:'Feira'},
    {id:'compradores',icon:'🛍', label:'Compradores', sub:'Clientes',      short:'Clientes'},
    {id:'producao',   icon:'📦', label:'Produção',    sub:'Por cidade',    short:'Produção'},
    {id:'relatorio',  icon:'📈', label:'Relatório',   sub:'Por período',   short:'Relatório'},
    {id:'produtos',   icon:'☕', label:'Produtos',    sub:'Catálogo',      short:'Produtos'},
    {id:'vendedores', icon:'👤', label:'Vendedores',  sub:'Equipe',        short:'Equipe'},
    {id:'cadastros',  icon:'⚙️', label:'Cadastros',   sub:'Cidades e feiras', short:'Config'},
  ];

  if(!ready) return (
    <div className="loading-screen" style={{height:'100vh',flexDirection:'column',gap:'1rem'}}>
      <div className="spinner"/>
      <span style={{color:'var(--text-muted)',fontSize:14}}>Conectando...</span>
      <span style={{color:'var(--text-muted)',fontSize:12,opacity:0.6}}>Aguarde ou verifique sua conexão</span>
    </div>
  );

  return (
    <div className="app">
      <div className="topbar no-print">
        <div className="topbar-logo">CAFÉ <span>&</span> TAL</div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:'auto'}}>
          <InstallButton/>
          <span className={`sync-dot ${syncing?'syncing':''}`} title={syncing?'Salvando...':'Sincronizado'}/>
        </div>
      </div>
      <div className="layout no-print">
        <aside className="sidebar no-print">
          {pages.map(p=>(
            <button key={p.id} className={`sidebar-card ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <span className="sidebar-icon">{p.icon}</span>
              <div>
                <div className="sidebar-label">{p.label}</div>
                <div className="sidebar-sub">{p.sub}</div>
              </div>
            </button>
          ))}
        </aside>
        <main className="content-area">
          {page==='dashboard'&&<Dashboard syncing={syncing} setSyncing={setSyncing}/>}
          {page==='vendas'&&<Vendas syncing={syncing} setSyncing={setSyncing}/>}
          {page==='feirinha'&&<Feirinha syncing={syncing} setSyncing={setSyncing}/>}
          {page==='compradores'&&<Compradores syncing={syncing} setSyncing={setSyncing}/>}
          {page==='producao'&&<Producao/>}
          {page==='relatorio'&&<Relatorio/>}
          {page==='produtos'&&<Produtos syncing={syncing} setSyncing={setSyncing}/>}
          {page==='vendedores'&&<Vendedores syncing={syncing} setSyncing={setSyncing}/>}
          {page==='cadastros'&&<Cadastros syncing={syncing} setSyncing={setSyncing}/>}
        </main>
      </div>
      <nav className="bottom-nav no-print">
        <div className="bottom-nav-inner">
          {pages.map(p=>(
            <button key={p.id} className={`bnav-btn ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
              <span className="bnav-icon">{p.icon}</span>
              <span className="bnav-label">{p.short}</span>
            </button>
          ))}
        </div>
      </nav>
      <footer className="no-print" style={{padding:'20px 28px',fontFamily:"'Geist',system-ui,sans-serif",borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div style={{fontSize:'0.88rem',color:'var(--text)',lineHeight:1.4}}>
            <span style={{fontWeight:400}}>Developed by </span><span style={{fontWeight:600}}>Datum Studio</span>
          </div>
          <div style={{textAlign:'right',color:'var(--text-muted)',fontSize:'0.72rem',lineHeight:1.7}}>
            <div>Sistema de Gestão · Café &amp; Tal</div>
            <div>v1.0.0</div>
            <div>© <span id="footer-ano">2026</span></div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const el = document.getElementById('footer-ano');
    if (el) el.textContent = new Date().getFullYear();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
